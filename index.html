<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Makan Arastuie — machine learning engineer.">
<title>Makan Arastuie</title>
<link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
<style>
  @font-face {
    font-family: "Departure Mono";
    src: local("Departure Mono"), local("DepartureMono-Regular"), url("fonts/DepartureMono-Regular.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "STIX Two Text";
    src: local("STIX Two Text"), url("fonts/STIXTwoText.woff2") format("woff2");
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --bg: #faf9f6;
    --text: #2e2d2b;
    --muted: #6e6d68;
    --faint: #c2c0ba;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191918;
      --text: #c6c5c0;
      --muted: #8f8e88;
      --faint: #52514d;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: "STIX Two Text", Georgia, "Times New Roman", serif;
    font-size: 18px;
    line-height: 1.55;
    padding: 1.4rem;
  }
  main { max-width: 34rem; text-align: center; }
  h1 {
    font-family: "Departure Mono", ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin: 0 0 1.2rem;
  }
  p { margin: 0.9rem 0; }
  .quip { color: var(--muted); font-style: italic; }
  a {
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-decoration-color: var(--faint);
    text-underline-offset: 3px;
  }
  a:hover { text-decoration-color: var(--text); }
  .links { margin-top: 1.6rem; font-size: 15px; color: var(--muted); }
  .links a { color: var(--muted); }
  .links a:hover { color: var(--text); }
  .links span { color: var(--faint); margin: 0 0.35rem; }
</style>
</head>
<body>
<main>
  <h1>Makan Arastuie</h1>
  <p>This page is being rebuilt as we speak. Check back shortly.</p>
  <p class="quip">The old version still said I worked at Seagate. It's been a minute.</p>
  <p>In the meantime, you can reach me at <span id="email"><noscript>makan [dot] arastuie [at] gmail</noscript></span>.</p>
  <p class="links">
    <a target="_blank" rel="noopener noreferrer" href="m/resume.pdf">Resume</a><span>&middot;</span>
    <a target="_blank" rel="noopener noreferrer" href="https://scholar.google.com/citations?hl=en&amp;user=fOvU1-4AAAAJ">Scholar</a><span>&middot;</span>
    <a target="_blank" rel="noopener noreferrer" href="https://github.com/arastuie">GitHub</a><span>&middot;</span>
    <a target="_blank" rel="noopener noreferrer" href="https://x.com/arastuie">X</a><span>&middot;</span>
    <a target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/in/arastuie">LinkedIn</a>
  </p>
</main>
<script>
  // Assembled at runtime to keep the address out of the static HTML.
  (function () {
    var el = document.getElementById('email');
    el.textContent = ['makan', '.', 'arastuie'].join('') + '@' + ['gmail', 'com'].join('.');
  })();
</script>
</body>
</html>
